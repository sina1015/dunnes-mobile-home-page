<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script src="https://static.facilio.com/apps-sdk/beta/facilio_apps_sdk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #7c3aed;
      --accent-dark: #6d28d9;
      --accent-soft: #ede9fe;
      --text: #1f2937;
      --muted: #6b7280;
      --surface: #ffffff;
      --bg: #f6f7f9;
      --radius: 0.45rem;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100%;
    }
    .page { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* ---- Brand logo ---- */
    .brand {
      background: var(--surface);
      border: 1px solid #ececf1;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
    }
    .brand img { height: 44px; width: auto; max-width: 80%; object-fit: contain; }

    /* ---- Banner ---- */
    .banner {
      background: linear-gradient(120deg, #1d4ed8 0%, #2563eb 60%, #3b82f6 100%);
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
    }
    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #fff;
      color: #1d4ed8;
      font-size: 20px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .banner-text { min-width: 0; }
    .hello { font-size: 13px; opacity: 0.9; }
    .who {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mail {
      font-size: 12px; opacity: 0.85;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ---- Action cards ---- */
    .action-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid #ececf1;
      border-radius: 16px;
      padding: 22px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      font: inherit;
      color: var(--text);
      text-align: left;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }
    .action-card:active { transform: scale(0.985); box-shadow: 0 1px 2px rgba(16,24,40,0.08); }
    .action-icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--accent-soft);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .action-icon svg { width: 34px; height: 34px; stroke: var(--accent); }
    .action-title {
      flex: 1;
      min-width: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
    }
    .action-cta {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      pointer-events: none; /* whole card is the tap target */
    }
    .action-cta svg { width: 18px; height: 18px; stroke: #fff; }

    /* Count badge on the pending tasks icon */
    .badge {
      position: absolute;
      top: -8px; right: -8px;
      min-width: 24px; height: 24px;
      padding: 0 6px;
      border-radius: 12px;
      background: #1d4ed8;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--surface);
    }
    .chev { flex-shrink: 0; }
    .chev svg { width: 22px; height: 22px; stroke: var(--muted); }

    .subtle { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; }

    /* ---- Loading skeleton (first paint, before app.loaded) ---- */
    .sk { border-radius: 12px; background: #e8eaee; position: relative; overflow: hidden; }
    .sk::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .sk-banner { height: 96px; }
    .sk-btn { height: 108px; border-radius: 16px; }
  </style>
</head>
<body>

    <div class="page">
      <!-- Skeleton until SDK handshake completes -->
      <template v-if="loading">
        <div class="sk" style="height: 68px;"></div>
        <div class="sk sk-banner"></div>
        <div class="sk sk-btn"></div>
        <div class="sk sk-btn"></div>
      </template>

        <button class="action-card" @click="goToServiceCatalog">
          <span class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </span>
          <span class="action-title">Raise Work Order Request</span>
          <span class="action-cta">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New Request
          </span>
        </button>

        <!-- My Pending Tasks -->
        <button class="action-card" @click="openPendingTasks">
          <span class="action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <span class="badge" v-if="pendingCount > 0">{{ pendingCount }}</span>
          </span>
          <span class="action-title">
            My Pending Tasks
            <div class="subtle" v-if="tasksLoading">Checking approvals&hellip;</div>
            <div class="subtle" v-else-if="pendingCount === 0">Approvals awaiting review</div>
            <div class="subtle" v-else>{{ pendingCount }} risk assessment{{ pendingCount === 1 ? '' : 's' }} awaiting approval</div>
          </span>
          <span class="chev">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </button>
      </template>
    </div>
  </div>

  <script>
    // ============ OCCUPANT PORTAL (REQUESTER) APP BUILD ============
    // Sandbox org ids/values — re-verify when promoting to production.

    // Service Catalog tab id (verified working on-device in sandbox).
    var SERVICE_CATALOG_TAB_ID = 53565;

    // Module linkName holding the risk-assessment inspections.
    var INSPECTION_MODULE = 'inspectionResponse';

    // List view + filter for pending approvals — captured verbatim from the
    // portal's own list request (Network > Payload):
    //   moduleName: inspectionResponse
    //   viewName:   allriskassessmentsandworksurveys
    //   quickFilter: {"moduleState":{"value":["37296"]}}
    // 37296 = "Store Manager Approval Required" state id (sandbox org —
    // re-capture for production).
    var INSPECTION_VIEW = 'allriskassessmentsandworksurveys';
    var PENDING_FILTER = { moduleState: { value: ['37296'] } };

    // (Name matching — "contains 'Risk Assessment'" — now lives inside the
    // Facilio Function, not in the widget.)
    // …and whose status matches this (compared case/punctuation-insensitively
    // against the state's linkName or display name, so it matches both
    // "storemanagerapprovalrequired" and "Store Manager Approval Required").

    // =========================================================

    new Vue({
      el: '#app',
      data: {
        loading: true,
        tasksLoading: true,
        navigating: false,
        user: {},
        org: {},
        pendingItems: []
      },
      computed: {
        displayName() {
          return (this.user && this.user.name) || (this.org && this.org.name) || 'Welcome';
        },
        email() {
          return (this.user && (this.user.email || this.user.userName)) || '';
        },
        avatarUrl() {
          return (this.user && this.user.avatarUrl) || '';
        },
        initials() {
          var n = this.displayName || '';
          var parts = n.trim().split(/\s+/);
          var ini = parts.slice(0, 2).map(function (p) { return p.charAt(0); }).join('');
          return (ini || 'U').toUpperCase();
        },
        pendingCount() {
          return this.pendingItems.length;
        }
      },
      created() {
        window.facilioApp = FacilioAppSDK.init();
        window.facilioApp.on('app.loaded', () => {
          try {
            this.user = window.facilioApp.getCurrentUser() || {};
            this.org = window.facilioApp.getCurrentOrg() || {};
            window.facilioApp.log.info(
              'Home widget loaded | user=' + (this.user.id || 'n/a') +
              ' | org=' + (this.org.id || 'n/a')
            );
          } catch (error) {
            window.facilioApp.log.error('Home widget: context read failed', error);
          } finally {
            this.loading = false;
            this.loadPendingTasks(); // async; the card shows its own sub-state
            window.takePrintNow = true;
          }
        });
        window.facilioApp.on('app.destroyed', function () { /* no-op */ });
      },
      methods: {
        // ---------- pending tasks ----------
        async loadPendingTasks() {
          // Best-effort badge count only — navigation never depends on this.
          this.tasksLoading = true;
          try {
            var response = await window.facilioApp.api.fetchAll(INSPECTION_MODULE, {
              viewName: INSPECTION_VIEW,
              page: 1,
              perPage: 200,
              filters: JSON.stringify(PENDING_FILTER)
            });
            var list = (response && response.list) || [];
            this.pendingItems = list;
            window.facilioApp.log.info('Pending tasks: badge count = ' + list.length);
          } catch (error) {
            window.facilioApp.log.error('Pending tasks: badge fetch failed', error);
            this.pendingItems = [];
          } finally {
            this.tasksLoading = false;
          }
        },
        openPendingTasks() {
          try {
            var payload = {
              module: INSPECTION_MODULE,
              view: INSPECTION_VIEW,
              filters: JSON.stringify(PENDING_FILTER)
            };
            window.facilioApp.log.info('Pending tasks tapped | openListView ' + JSON.stringify(payload));
            window.facilioApp.interface.openListView(payload);
          } catch (error) {
            window.facilioApp.log.error('Pending tasks: openListView failed', error);
            try {
              window.facilioApp.interface.notify({
                title: 'Navigation failed',
                message: 'Could not open pending tasks. Please try again.',
                type: 'error'
              });
            } catch (e) { /* best-effort */ }
          }
        },
        // ---------- service catalog ----------
        async goToServiceCatalog() {
          if (this.navigating) return;
          this.navigating = true;
          try {
            window.facilioApp.log.info(
              'Raise Work Order Request tapped | navigateTab id=' + SERVICE_CATALOG_TAB_ID
            );
            var r = window.facilioApp.interface.trigger('navigateTab', {
              id: SERVICE_CATALOG_TAB_ID,
              type: 'SERVICE_CATALOG'
            });
            var resolved = (r && typeof r.then === 'function') ? await r : r;
            window.facilioApp.log.info('navigateTab id=' + SERVICE_CATALOG_TAB_ID + ' resolved=' + JSON.stringify(resolved));
            if (resolved === false) {
              window.facilioApp.interface.notify({
                title: 'Navigation failed',
                message: 'Could not open the Service Catalog. Please try again.',
                type: 'error'
              });
            }
          } catch (error) {
            window.facilioApp.log.error('Navigation to Service Catalog failed', error);
            try {
              window.facilioApp.interface.notify({
                title: 'Navigation failed',
                message: 'Could not open the Service Catalog. Please try again.',
                type: 'error'
              });
            } catch (e) { /* best-effort */ }
          } finally {
            this.navigating = false;
          }
        }
      }
    });
  </script>
</body>
</html>
