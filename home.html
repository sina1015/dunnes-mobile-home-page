<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script src="https://static.facilio.com/apps-sdk/beta/facilio_apps_sdk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --accent: #7c3aed;
      --text: #1f2937;
      --muted: #6b7280;
      --surface: #ffffff;
      --bg: #f6f7f9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100%;
    }
    .page { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    .banner {
      background: linear-gradient(120deg, #1d4ed8 0%, #2563eb 60%, #3b82f6 100%);
      border-radius: 12px;
      padding: 20px 16px;
      display: flex; align-items: center; gap: 14px;
      color: #fff;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
    }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #fff; color: #1d4ed8;
      font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .banner-text { min-width: 0; }
    .hello { font-size: 13px; opacity: 0.9; }
    .who { font-size: 19px; font-weight: 700; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mail { font-size: 12px; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .section-title { font-size: 15px; font-weight: 700; margin-top: 4px; }

    .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tile {
      background: var(--surface);
      border: 1px solid #ececf1;
      border-radius: 12px;
      padding: 14px 12px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tile:active { transform: scale(0.985); }
    .tile-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .tile-desc {
      font-size: 12px; color: var(--muted); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .tile-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: #eef2ff; color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }

    .empty-note {
      font-size: 13px; color: var(--muted);
      background: var(--surface); border: 1px dashed #d7d9e0;
      border-radius: 12px; padding: 14px; text-align: center;
    }

    .sk { border-radius: 12px; background: #e8eaee; position: relative; overflow: hidden; }
    .sk::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .sk-banner { height: 96px; }
    .sk-tile { height: 110px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="page">
      <template v-if="loading">
        <div class="sk sk-banner"></div>
        <div class="tiles">
          <div class="sk sk-tile"></div>
          <div class="sk sk-tile"></div>
          <div class="sk sk-tile"></div>
          <div class="sk sk-tile"></div>
        </div>
      </template>

      <template v-else>
        <div class="banner">
          <div class="avatar">
            <img v-if="avatarUrl" :src="avatarUrl" alt="" />
            <span v-else>{{ initials }}</span>
          </div>
          <div class="banner-text">
            <div class="hello">Hello &#128075;</div>
            <div class="who">{{ displayName }}</div>
            <div class="mail" v-if="email">{{ email }}</div>
          </div>
        </div>

        <div class="section-title">Raise Work Request</div>

        <div v-if="catalogItems.length" class="tiles">
          <div v-for="item in catalogItems" :key="item.id" class="tile" @click="openCatalogItem(item)">
            <div class="tile-icon">{{ (item.name || '?').charAt(0).toUpperCase() }}</div>
            <div class="tile-name">{{ item.name }}</div>
            <div class="tile-desc" v-if="item.description">{{ item.description }}</div>
          </div>
        </div>

        <div v-else class="empty-note">
          Service catalog is not available right now.
        </div>
      </template>
    </div>
  </div>

  <script>
    // Fallback web page (sandbox URL — swap for the production org before go-live)
    var CATALOG_URL = 'https://dunnesstores.faciliosandbox.co.uk/dunnesstoressandbox/maintenance/service-request/servicecatalog/requests';

    new Vue({
      el: '#app',
      data: {
        loading: true,
        user: {},
        org: {},
        catalogItems: [],
        navigating: false
      },
      computed: {
        displayName() {
          return (this.user && this.user.name) || (this.org && this.org.name) || 'Welcome';
        },
        email() {
          return (this.user && (this.user.email || this.user.userName)) || '';
        },
        avatarUrl() {
          return (this.user && this.user.avatarUrl) || '';
        },
        initials() {
          var n = this.displayName || '';
          var parts = n.trim().split(/\s+/);
          var ini = parts.slice(0, 2).map(function (p) { return p.charAt(0); }).join('');
          return (ini || 'U').toUpperCase();
        }
      },
      created() {
        window.facilioApp = FacilioAppSDK.init();
        window.facilioApp.on('app.loaded', async () => {
          try {
            this.user = window.facilioApp.getCurrentUser() || {};
            this.org = window.facilioApp.getCurrentOrg() || {};
            window.facilioApp.log.info('Home widget loaded | user=' + (this.user.id || 'n/a'));
            await this.loadCatalog();
          } catch (error) {
            window.facilioApp.log.error('Home widget: init failed', error);
          } finally {
            this.loading = false;
            window.takePrintNow = true;
          }
        });
        window.facilioApp.on('app.destroyed', function () { /* no-op */ });
      },
      methods: {
        // Pull the first array out of an unknown response shape
        extractList(response) {
          var data = response && response.data;
          if (!data) return [];
          if (Array.isArray(data)) return data;
          for (var key in data) {
            if (Array.isArray(data[key])) return data[key];
          }
          return [];
        },

        async loadCatalog() {
          var endpoints = [
            '/v2/servicecatalog/list?page=1&perPage=50&appId=1902',
            '/v2/servicecataloggroup/list?appId=1902',
            'v2/servicecatalog/list?page=1&perPage=50&appId=1902',
            '/api/v2/servicecatalog/list?page=1&perPage=50&appId=1902',
            '/v3/modules/servicecatalog/view/all?page=1&perPage=50&viewName=all&moduleName=servicecatalog'
          ];
          for (var i = 0; i < endpoints.length; i++) {
            try {
              var resp = await window.facilioApp.request.invokeFacilioAPI(endpoints[i], { method: 'GET' });
              window.facilioApp.log.info(
                'Catalog try ' + i + ' [' + endpoints[i] + '] -> ' +
                JSON.stringify(resp && resp.data).substring(0, 600)
              );
              var list = this.extractList(resp);
              if (list.length) {
                this.catalogItems = list.map(function (it) {
                  return {
                    id: it.id,
                    name: it.name || it.displayName || it.subject || ('Item ' + it.id),
                    description: it.description || '',
                    raw: it
                  };
                });
                window.facilioApp.log.info('Catalog LOADED: ' + this.catalogItems.length + ' items via try ' + i);
                return;
              }
            } catch (e) {
              window.facilioApp.log.error('Catalog try ' + i + ' FAILED [' + endpoints[i] + '] ' + (e && (e.message || JSON.stringify(e))), e);
            }
          }
          window.facilioApp.log.error('Catalog: all endpoint variants empty/failed');
        },

        async openCatalogItem(item) {
          if (this.navigating) return;
          this.navigating = true;
          try {
            // Log the full item so the correct tap target (formId etc.) can be wired
            window.facilioApp.log.info('Catalog tile tapped: ' + JSON.stringify(item.raw).substring(0, 800));

            if (item.raw && item.raw.formId) {
              await window.facilioApp.interface.openForm({
                module: 'serviceRequest',
                formDetails: { formId: item.raw.formId }
              });
            } else {
              await window.facilioApp.interface.openURL({ url: CATALOG_URL });
            }
          } catch (error) {
            window.facilioApp.log.error('Catalog item open failed', error);
            try {
              await window.facilioApp.interface.openURL({ url: CATALOG_URL });
            } catch (e2) {
              window.facilioApp.interface.notify({
                title: 'Could not open',
                message: 'Unable to open this request type. Please try again.',
                type: 'error'
              });
            }
          } finally {
            this.navigating = false;
          }
        }
      }
    });
  </script>
</body>
</html>
