<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script src="https://static.facilio.com/apps-sdk/beta/facilio_apps_sdk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #7c3aed;
      --text: #1f2937;
      --muted: #6b7280;
      --surface: #ffffff;
      --bg: #f6f7f9;
      --radius: 0.45rem;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100%;
    }
    .page { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* ---- Banner ---- */
    .banner {
      background: linear-gradient(120deg, #1d4ed8 0%, #2563eb 60%, #3b82f6 100%);
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
    }
    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #fff;
      color: #1d4ed8;
      font-size: 20px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .banner-text { min-width: 0; }
    .hello { font-size: 13px; opacity: 0.9; }
    .who {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mail {
      font-size: 12px; opacity: 0.85;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ---- Raise Work Request button ---- */
    .raise-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid #ececf1;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      font: inherit;
      color: var(--text);
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }
    .raise-btn:active { transform: scale(0.985); box-shadow: 0 1px 2px rgba(16,24,40,0.08); }
    .raise-label { font-size: 15px; font-weight: 600; }
    .raise-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .raise-icon svg { width: 20px; height: 20px; stroke: #fff; }

    /* ---- Loading skeleton (first paint, before app.loaded) ---- */
    .sk { border-radius: 12px; background: #e8eaee; position: relative; overflow: hidden; }
    .sk::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .sk-banner { height: 96px; }
    .sk-btn { height: 72px; }

    /* TEMP DEBUG: remove once navigateTo behavior is confirmed */
    .debug-box {
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #111827;
      color: #d1fae5;
      border-radius: 8px;
      padding: 10px 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page">
      <!-- Skeleton until SDK handshake completes -->
      <template v-if="loading">
        <div class="sk sk-banner"></div>
        <div class="sk sk-btn"></div>
      </template>

      <template v-else>
        <!-- Banner -->
        <div class="banner">
          <div class="avatar">
            <img v-if="avatarUrl" :src="avatarUrl" alt="" />
            <span v-else>{{ initials }}</span>
          </div>
          <div class="banner-text">
            <div class="hello">Hello &#128075;</div>
            <div class="who">{{ displayName }}</div>
            <div class="mail" v-if="email">{{ email }}</div>
          </div>
        </div>

        <!-- Raise Work Request -->
        <button class="raise-btn" @click="goToServiceRequest">
          <span class="raise-label">SR</span>
          <span class="raise-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="12" y1="7" x2="12" y2="13"/>
              <line x1="9" y1="10" x2="15" y2="10"/>
            </svg>
          </span>
        </button>

        <!-- TEMP DEBUG: remove once navigateTo behavior is confirmed -->
        <div v-if="debugMsg" class="debug-box">{{ debugMsg }}</div>
      </template>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        loading: true,
        user: {},
        org: {},
        navigating: false,
        debugMsg: ''
      },
      computed: {
        displayName() {
          return (this.user && this.user.name) || (this.org && this.org.name) || 'Welcome';
        },
        email() {
          return (this.user && (this.user.email || this.user.userName)) || '';
        },
        avatarUrl() {
          return (this.user && this.user.avatarUrl) || '';
        },
        initials() {
          var n = this.displayName || '';
          var parts = n.trim().split(/\s+/);
          var ini = parts.slice(0, 2).map(function (p) { return p.charAt(0); }).join('');
          return (ini || 'U').toUpperCase();
        }
      },
      created() {
        window.facilioApp = FacilioAppSDK.init();
        window.facilioApp.on('app.loaded', () => {
          try {
            this.user = window.facilioApp.getCurrentUser() || {};
            this.org = window.facilioApp.getCurrentOrg() || {};
            window.facilioApp.log.info(
              'Mobile home widget loaded | user=' + (this.user.id || 'n/a') +
              ' | org=' + (this.org.id || 'n/a') +
              ' | mobile=' + (window.facilioApp.isMobile ? window.facilioApp.isMobile() : 'n/a')
            );
          } catch (error) {
            window.facilioApp.log.error('Mobile home widget: context read failed', error);
          } finally {
            this.loading = false;
            window.takePrintNow = true;
          }
        });
        window.facilioApp.on('app.destroyed', function () { /* no-op */ });
      },
      methods: {
        async goToServiceRequest() {
          // Prove the click handler itself is firing, before anything else can swallow it
          this.debugMsg = 'tapped @ ' + new Date().toLocaleTimeString();

          if (this.navigating) {
            this.debugMsg += '\n(ignored — already navigating)';
            return;
          }
          this.navigating = true;
          try {
            window.facilioApp.log.info('Mobile home widget: Raise Work Request tapped');

            // The service catalog is a TAB whose route is "service-catalogue"
            // (from Setup > Customization > Tabs and Layouts) — navigate by path
            var path = '/service-catalogue';
            window.facilioApp.log.info('Trying navigateTo path: ' + path);
            this.debugMsg += '\ncalling navigateTo(' + path + ')...';

            var result = await window.facilioApp.interface.navigateTo({ path: path });

            window.facilioApp.log.info('navigateTo result: ' + JSON.stringify(result));
            this.debugMsg += '\nresult: ' + JSON.stringify(result);

          } catch (error) {
            window.facilioApp.log.error('navigateTo error: ', error);
            this.debugMsg += '\nerror: ' + (error && (error.message || JSON.stringify(error)));
          } finally {
            this.navigating = false;
          }
        }
      }
    });
  </script>
</body>
</html>
