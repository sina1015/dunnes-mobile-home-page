<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script src="https://static.facilio.com/apps-sdk/beta/facilio_apps_sdk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #7c3aed;
      --text: #1f2937;
      --muted: #6b7280;
      --surface: #ffffff;
      --bg: #f6f7f9;
      --radius: 0.45rem;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100%;
    }
    .page { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    .banner {
      background: linear-gradient(120deg, #1d4ed8 0%, #2563eb 60%, #3b82f6 100%);
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
    }
    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #fff;
      color: #1d4ed8;
      font-size: 20px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .banner-text { min-width: 0; }
    .hello { font-size: 13px; opacity: 0.9; }
    .who {
      font-size: 19px; font-weight: 700; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mail {
      font-size: 12px; opacity: 0.85;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .raise-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid #ececf1;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; cursor: pointer; font: inherit; color: var(--text);
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }
    .raise-btn:active { transform: scale(0.985); }
    .raise-label { font-size: 15px; font-weight: 600; }
    .raise-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .raise-icon svg { width: 20px; height: 20px; stroke: #fff; }

    /* ---- Debug panel ---- */
    .dbg {
      background: #111827;
      color: #d1d5db;
      border-radius: 12px;
      padding: 12px;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11px;
      line-height: 1.6;
      max-height: 220px;
      overflow-y: auto;
      word-break: break-all;
    }
    .dbg-title { color: #93c5fd; font-weight: 700; margin-bottom: 4px; }
    .dbg-line.err { color: #fca5a5; }
    .dbg-line.ok { color: #86efac; }
    .dbg-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .dbg-actions button {
      flex: 1; min-width: 120px;
      background: var(--surface);
      border: 1px solid #ececf1;
      border-radius: 10px;
      padding: 10px;
      font: inherit; font-size: 12px; font-weight: 600;
      color: var(--text); cursor: pointer;
    }

    .sk { border-radius: 12px; background: #e8eaee; position: relative; overflow: hidden; }
    .sk::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .sk-banner { height: 96px; }
    .sk-btn { height: 72px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="page">
      <template v-if="loading">
        <div class="sk sk-banner"></div>
        <div class="sk sk-btn"></div>
      </template>

      <template v-else>
        <div class="banner">
          <div class="avatar">
            <img v-if="avatarUrl" :src="avatarUrl" alt="" />
            <span v-else>{{ initials }}</span>
          </div>
          <div class="banner-text">
            <div class="hello">Hello &#128075;</div>
            <div class="who">{{ displayName }}</div>
            <div class="mail" v-if="email">{{ email }}</div>
          </div>
        </div>

        <!-- Main button: Service Catalog via primary id -->
        <button class="raise-btn" @click="navigateWith(53147, 'SERVICE_CATALOG')">
          <span class="raise-label">Service Catalog</span>
          <span class="raise-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </span>
        </button>

        <!-- DEBUG: alternate attempts. Remove this whole block once one works. -->
        <div class="dbg-actions">
          <button @click="navigateWith(19005, 'SERVICE_CATALOG')">Try id 19005</button>
          <button @click="navigateWith(53147, 'WEB_TAB')">53147 / WEB_TAB</button>
          <button @click="navigateWith(19005, 'WEB_TAB')">19005 / WEB_TAB</button>
          <button @click="tryOpenList()">openListView SR</button>
        </div>

        <!-- DEBUG: on-screen log. Remove once resolved. -->
        <div class="dbg">
          <div class="dbg-title">DEBUG (newest first)</div>
          <div v-for="(l, i) in dbgLines" :key="i" class="dbg-line" :class="l.cls">{{ l.msg }}</div>
        </div>
      </template>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        loading: true,
        user: {},
        org: {},
        navigating: false,
        dbgLines: []
      },
      computed: {
        displayName() {
          return (this.user && this.user.name) || (this.org && this.org.name) || 'Welcome';
        },
        email() {
          return (this.user && (this.user.email || this.user.userName)) || '';
        },
        avatarUrl() {
          return (this.user && this.user.avatarUrl) || '';
        },
        initials() {
          var n = this.displayName || '';
          var parts = n.trim().split(/\s+/);
          var ini = parts.slice(0, 2).map(function (p) { return p.charAt(0); }).join('');
          return (ini || 'U').toUpperCase();
        }
      },
      methods: {
        dbg(msg, cls) {
          var t = new Date().toISOString().substr(11, 8);
          this.dbgLines.unshift({ msg: t + '  ' + msg, cls: cls || '' });
          try { window.facilioApp.log.info('[DBG] ' + msg); } catch (e) { /* noop */ }
        },
        navigateWith(id, type) {
          try {
            this.dbg('trigger navigateTab id=' + id + ' type=' + type);
            var r = window.facilioApp.interface.trigger('navigateTab', { id: id, type: type });
            this.dbg('trigger returned: ' + this.safe(r), 'ok');
            if (r && typeof r.then === 'function') {
              var self = this;
              r.then(function (v) { self.dbg('resolved: ' + self.safe(v), 'ok'); })
               .catch(function (e) { self.dbg('REJECTED: ' + self.safe(e), 'err'); });
            }
          } catch (error) {
            this.dbg('THREW: ' + this.safe(error), 'err');
          }
        },
        async tryOpenList() {
          try {
            this.dbg('openListView module=serviceRequest');
            await window.facilioApp.interface.openListView({ module: 'serviceRequest' });
            this.dbg('openListView accepted', 'ok');
          } catch (e) {
            this.dbg('openListView REJECTED: ' + this.safe(e), 'err');
          }
        },
        safe(v) {
          try {
            if (v === undefined) return 'undefined';
            if (v instanceof Error) return v.message || String(v);
            return JSON.stringify(v);
          } catch (e) { return String(v); }
        }
      },
      created() {
        window.facilioApp = FacilioAppSDK.init();
        window.facilioApp.on('app.loaded', () => {
          try {
            this.user = window.facilioApp.getCurrentUser() || {};
            this.org = window.facilioApp.getCurrentOrg() || {};
          } catch (error) {
            /* context read best-effort */
          } finally {
            this.loading = false;
            this.$nextTick(() => {
              this.dbg('app.loaded | user=' + (this.user.id || 'n/a') +
                       ' | org=' + (this.org.id || 'n/a') +
                       ' | isMobile=' + (window.facilioApp.isMobile ? this.safe(window.facilioApp.isMobile()) : 'n/a'));
              try {
                var ctx = window.facilioApp.getContext ? window.facilioApp.getContext() : null;
                this.dbg('context: ' + this.safe(ctx));
              } catch (e) {
                this.dbg('getContext threw: ' + this.safe(e), 'err');
              }
            });
            window.takePrintNow = true;
          }
        });
        window.facilioApp.on('app.destroyed', function () { /* no-op */ });
      }
    });
  </script>
</body>
</html>
